<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sofy Stitch</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f8e8ee;
      text-align: center;
      margin: 0;
    }

    header {
      background-color: #e8c1c9;
      padding: 25px;
      font-size: 26px;
      font-weight: bold;
      color: #5a3e45;
    }

    header p {
      font-size: 14px;
      margin-top: 5px;
      font-weight: normal;
    }

    h2 {
      color: #5a3e45;
    }

    .produto {
      background: #ffffff;
      margin: 20px;
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background-color: #c7e8ca;
      color: #355f3b;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #a8d5ac;
    }

    .whatsapp {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  🧶 Sofy Stitch
  <p>feito à mão com amor</p>
</header>

<h2>Produtos</h2>

<div class="produto">
  <h3>Biquíni de Crochê</h3>
  <p>R$ 230,00</p>
  <button>Comprar</button>
</div>

<div class="produto">
  <h3>Top de Crochê</h3>
  <p>R$ 120,00</p>
  <button>Comprar</button>
</div>

<div class="produto">
  <h3>Bolsa de Crochê</h3>
  <p>R$ 150,00</p>
  <button>Comprar</button>
</div>

<div class="whatsapp">
  <h3>Fale comigo 💬</h3>
  <button onclick="window.location.href='https://wa.me/5545999097396'">
    WhatsApp
  </button>
</div>

</body>
</html>
