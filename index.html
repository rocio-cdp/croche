<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Loja de Crochê</title>
  <style>
    body {
      font-family: Arial;
      background-color: #fff5f7;
      text-align: center;
      margin: 0;
    }
    header {
      background-color: #ffb6c1;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .produto {
      background: white;
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
    }
    button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🧶 Minha Loja de Crochê</header>

<h2>Produtos</h2>

<div class="produto">
  <h3>Biquíni de Crochê</h3>
  <p>R$ 230,00</p>
  <button>Comprar</button>
</div>

<div class="produto">
  <h3>Top de Crochê</h3>
  <p>R$ 120,00</p>
  <button>Comprar</button>
</div>

<div class="produto">
  <h3>Bolsa de Crochê</h3>
  <p>R$ 150,00</p>
  <button>Comprar</button>
</div>

</body>
</html>
